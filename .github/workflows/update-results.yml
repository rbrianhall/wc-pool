name: Update World Cup results

# Two-speed polling:
#   - A cron dispatcher fires every 30 minutes.
#   - The job polls the API once. If a match is live (or kicks off within
#     25 min), it keeps polling every 60 seconds — through stoppage time,
#     extra time, and penalties — committing data.json only when something
#     changed. Otherwise it exits immediately.
#   - After each push it explicitly requests a GitHub Pages rebuild,
#     because commits made by the workflow bot do NOT trigger the Pages
#     deploy workflow on their own.

on:
  schedule:
    - cron: "*/30 * * * *"   # delete after the final on July 19
  workflow_dispatch: {}      # manual refresh from the Actions tab

permissions:
  contents: write
  pages: write

concurrency:
  group: results-updater
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Poll ESPN scoreboard (60s loop while matches are live)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "pool-bot"
          git config user.email "actions@users.noreply.github.com"
          fails=0
          for i in $(seq 1 330); do
            if out=$(python3 scripts/update_results.py 2>&1); then
              fails=0
              echo "$out"
            else
              echo "$out"
              fails=$((fails+1))
              if [ "$fails" -ge 5 ]; then
                echo "::error::5 consecutive API failures — check the messages above"
                exit 1
              fi
              sleep 60; continue
            fi
            state=$(echo "$out" | sed -n 's/^LIVE_STATE: //p')
            if ! git diff --quiet data.json; then
              git add data.json
              git commit -m "Live update $(date -u +'%Y-%m-%d %H:%M UTC')"
              git pull --rebase origin main && git push
              curl -s -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/pages/builds" \
                -o /dev/null -w "Pages rebuild requested (HTTP %{http_code})\n" || true
            fi
            if [ "$state" != "live" ] && [ "$state" != "soon" ]; then
              echo "No live or imminent matches — sleeping until next cron tick."
              break
            fi
            sleep 60
          done
