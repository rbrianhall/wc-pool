name: Update World Cup results

# Two-speed polling:
#   - A cron dispatcher fires every 30 minutes.
#   - The job polls the API once. If a match is live (or kicks off within
#     25 min), it stays alive and keeps polling every 60 seconds — through
#     stoppage time, extra time, and penalties — committing data.json only
#     when something actually changed. When no matches are live or imminent,
#     it exits immediately and costs nothing until the next tick.
# GitHub's cron is best-effort (ticks can run several minutes late), but the
# long-lived polling loop means that once a match window opens, updates flow
# every ~60s regardless of cron jitter.

on:
  schedule:
    - cron: "*/30 * * * *"   # delete after the final on July 19
  workflow_dispatch: {}      # manual refresh from the Actions tab

permissions:
  contents: write

concurrency:
  group: results-updater     # never two pollers at once; extras queue
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350     # hard cap below GitHub's 6h job limit
    steps:
      - uses: actions/checkout@v4

      - name: Poll football-data.org (60s loop while matches are live)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          git config user.name "pool-bot"
          git config user.email "actions@users.noreply.github.com"
          for i in $(seq 1 330); do
            out=$(python3 scripts/update_results.py) || { echo "$out"; echo "API call failed; retrying next tick"; sleep 60; continue; }
            echo "$out"
            state=$(echo "$out" | sed -n 's/^LIVE_STATE: //p')
            if ! git diff --quiet data.json; then
              git add data.json
              git commit -m "Live update $(date -u +'%Y-%m-%d %H:%M UTC')"
              git pull --rebase origin main && git push
            fi
            if [ "$state" != "live" ] && [ "$state" != "soon" ]; then
              echo "No live or imminent matches — sleeping until next cron tick."
              break
            fi
            sleep 60
          done
